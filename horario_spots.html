  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Roboto', sans-serif;
    background-color: #F5F0E8;
    color: #222;
    padding: 10px;
    min-height: 100vh;
  }
  header {
    text-align: center;
    padding: 20px 10px;
    background: #fff;
    border-radius: 15px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    margin-bottom: 20px;
  }
  .logo {
    max-width: 150px;
    margin-bottom: 10px;
  }
  h1 {
    color: #2B4590;
    font-size: 1.4em;
    margin-bottom: 5px;
  }
  #reloj {
    font-size: 1.1em;
    font-weight: bold;
    color: #555;
  }
  .search-box {
    margin-bottom: 20px;
  }
  input[type="text"] {
    width: 100%;
    padding: 12px 20px;
    border-radius: 25px;
    border: 1px solid #ddd;
    outline: none;
    font-size: 1em;
    box-shadow: 0 2px 5px rgba(0,0,0,0.03);
  }
  .grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 15px;
  }
  @media (min-width: 768px) {
    .grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (min-width: 1024px) {
    .grid { grid-template-columns: repeat(3, 1fr); }
  }
  .card {
    background: #fff;
    border-radius: 12px;
    padding: 15px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    border-left: 5px solid #2B4590;
    position: relative;
    transition: transform 0.2s;
  }
  .card:active { transform: scale(0.98); }
  .card h3 {
    color: #2B4590;
    font-size: 1.1em;
    margin-bottom: 8px;
    padding-right: 30px;
  }
  .card .version {
    font-size: 0.9em;
    color: #666;
    margin-bottom: 10px;
    font-style: italic;
  }
  .card .info-row {
    display: flex;
    justify-content: space-between;
    font-size: 0.85em;
    margin-bottom: 5px;
    color: #444;
  }
  .card .label { font-weight: bold; color: #777; }
  .card .footer {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid #eee;
    display: flex;
    justify-content: space-around;
    font-size: 0.8em;
  }
  .badge {
    padding: 3px 8px;
    border-radius: 10px;
    font-size: 0.75em;
    font-weight: bold;
    text-transform: uppercase;
  }
  .badge-spots { background: #E3EDFF; color: #2B4590; }
  .badge-menciones { background: #E8F5E9; color: #2E7D32; }
  .vence-pronto { border-left-color: #D32F2F; }
  .vence-label { color: #D32F2F; font-weight: bold; }

  /* Horarios overlay/list if needed */
  .hours-list {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-top: 8px;
  }
  .hour-chip {
    background: #f0f0f0;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 0.7em;
    color: #555;
  }
  
  .empty-msg {
    text-align: center;
    padding: 40px;
    color: #888;
    grid-column: 1 / -1;
  }
</style>

async function loadData() {
  try {
    const response = await fetch('spots_data.json');
    allClients = await response.json();
    // Limpiar posibles cabeceras o filas vacías
    allClients = allClients.filter(c => c.marca && c.marca.trim() !== "" && !c.marca.toLowerCase().includes("cliente"));
    renderClients(allClients);
  } catch (e) {
    console.error("Error cargando datos:", e);
    document.getElementById('clientsGrid').innerHTML = '<div class="empty-msg">Error al cargar el horario.</div>';
  }
}

function renderClients(clients) {
  const grid = document.getElementById('clientsGrid');
  grid.innerHTML = '';
  
  if (clients.length === 0) {
    grid.innerHTML = '<div class="empty-msg">No se encontraron clientes.</div>';
    return;
  }

  const today = new Date();

  clients.forEach(c => {
    const card = document.createElement('div');
    card.className = 'card';
    
    // Check expiration
    let vencePronto = false;
    if (c.fin && c.fin.includes('/')) {
        const parts = c.fin.split('/');
        const finDate = new Date(parts[2], parts[1]-1, parts[0]);
        const diff = (finDate - today) / (1000 * 60 * 60 * 24);
        if (diff >= 0 && diff <= 5) vencePronto = true;
    }
    
    if (vencePronto) card.classList.add('vence-pronto');

    let hoursHtml = '';
    if (c.hours && c.hours.length > 0) {
        hoursHtml = '<div class="hours-list">' + 
            c.hours.map(h => `<span class="hour-chip">${h}</span>`).join('') + 
            '</div>';
    }

    card.innerHTML = `
      <h3>${c.marca}</h3>
      <div class="version">${c.version || 'Versión no especificada'}</div>
      <div class="info-row">
        <span class="label">Días:</span>
        <span>${c.dias}</span>
      </div>
      <div class="info-row">
        <span class="label">Inicio:</span>
        <span>${c.inicio}</span>
      </div>
      <div class="info-row">
        <span class="label">Finalización:</span>
        <span class="${vencePronto ? 'vence-label' : ''}">${c.fin}</span>
      </div>
      ${hoursHtml}
      <div class="footer">
        <span class="badge badge-spots">${c.total_spots} Spots</span>
        ${c.menciones > 0 ? `<span class="badge badge-menciones">${c.menciones} Menciones</span>` : ''}
      </div>
    `;
    grid.appendChild(card);
  });
}

function filterClients() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = allClients.filter(c => 
    c.marca.toLowerCase().includes(q) || 
    (c.version && c.version.toLowerCase().includes(q))
  );
  renderClients(filtered);
}

function updateReloj() {
  const now = new Date();
  document.getElementById('reloj').textContent = now.toLocaleTimeString();
}

setInterval(updateReloj, 1000);
updateReloj();
loadData();
